<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body { background: radial-gradient(ellipse at top, #0a2a3d 0%, var(--sim-navy-800) 70%); padding: 22px; }
.panel { background: linear-gradient(180deg,#094a63,#042634); border-radius: 22px; padding: 18px 20px; border: 1px solid var(--border); box-shadow: var(--inner-gloss-top), 0 18px 36px rgba(0,0,0,.45), 0 4px 10px rgba(0,0,0,.3); display: grid; grid-template-columns: 60px 1fr auto; gap: 14px; align-items: center; }
.avatar { width: 60px; height: 60px; border-radius: 999px; background: linear-gradient(180deg,#ffe070,#f4c842); box-shadow: var(--inner-gloss-top), 0 4px 10px rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; color:#6e4e08; font-weight:900; font-size: 22px; font-family: var(--font-display); }
.who { font-family: var(--font-display); font-size: 20px; font-weight: 700; color:#f2fbff; }
.mood { font-size: 13px; color:#7bda2e; font-weight: 700; margin-top: 2px; }
.caption { font-size: 12px; color:#7fa8bb; margin-top: 4px; }
.pb { width: 42px; height: 56px; filter: drop-shadow(0 0 14px rgba(80,225,49,.6)); animation: spin 4s linear infinite; }
@keyframes spin { from { transform: rotateY(0) } to { transform: rotateY(360deg) } }
</style></head><body>
<div class="panel">
  <div class="avatar">EP</div>
  <div>
    <div class="who">Eliza Pancakes</div>
    <div class="mood">Energized · painting</div>
    <div class="caption">Autosaved 2m ago · 14 notes · §4,820</div>
  </div>
  <img class="pb" src="../assets/plumbob.svg" alt="">
</div>
</body></html>
