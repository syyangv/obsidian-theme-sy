<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body.card { display:flex; flex-direction:column; gap:14px; }
.moods { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.mood { padding: 12px; border-radius: 14px; box-shadow: var(--inner-gloss-top), var(--shadow-sm); color: #fff; font-weight:700; display:flex; flex-direction:column; gap:6px; min-height: 70px; }
.mood .n { font-size:11px; opacity:.85; font-family: var(--font-mono); }
.mood .t { font-family: var(--font-display); font-size:14px; }
</style></head><body class="card">
<div class="label" style="color:var(--fg-2)">Emotion moods — one per Sims aura</div>
<div class="moods">
  <div class="mood" style="background:linear-gradient(180deg,#ffe070,#f4c842); color:#6e4e08"><span class="t">Happy</span><span class="n">#f4c842</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#ff9cc7,#ff6fae)"><span class="t">Flirty</span><span class="n">#ff6fae</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#7bda2e,#50e131); color:#0b2a0b"><span class="t">Energized</span><span class="n">#50e131</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#7fc8dc,#3aa4c2)"><span class="t">Focused</span><span class="n">#3aa4c2</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#e3cbff,#c79bff); color:#3b1f6a"><span class="t">Inspired</span><span class="n">#c79bff</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#7fb4ff,#4a9bff)"><span class="t">Confident</span><span class="n">#4a9bff</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#ffb680,#ff8c3a)"><span class="t">Playful</span><span class="n">#ff8c3a</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#d97a60,#b84a2e)"><span class="t">Uncomf.</span><span class="n">#b84a2e</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#7a95b0,#4a6b8a)"><span class="t">Sad</span><span class="n">#4a6b8a</span></div>
  <div class="mood" style="background:linear-gradient(180deg,#ff6b6b,#d93030)"><span class="t">Tense</span><span class="n">#d93030</span></div>
</div>
</body></html>
