<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body.card { padding: 22px; display:flex; flex-direction:column; gap: 14px; }
.row3 { display:flex; gap: 10px; align-items:center; flex-wrap: wrap; }
button {
  font-family: var(--font-ui); font-weight: 700; font-size: 14px;
  padding: 10px 18px; border-radius: 14px; cursor: pointer;
  border: 1px solid transparent; box-shadow: var(--inner-gloss-top), var(--shadow-sm);
  transition: transform 120ms var(--ease-pop);
}
.primary { background: linear-gradient(180deg,#7bda2e,#3fb820); color: #0b2a0b; border-color:#2f8e16; box-shadow: var(--inner-gloss-top), 0 6px 14px rgba(0,0,0,.3), var(--shadow-glow-plumbob); }
.secondary { background: linear-gradient(180deg,#3aa4c2,#094a63); color: #e3f6fb; border-color:#063749; }
.ghost { background: rgba(127,200,220,.12); color:#cde5ef; border-color: var(--border); box-shadow: none; }
.danger { background: linear-gradient(180deg,#ff6b6b,#d93030); color:#fff; border-color:#a21818; }
.sml { padding: 6px 12px; font-size: 12px; border-radius: 10px; }
.pill { border-radius: 999px; }
.label { color: var(--fg-3); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; width: 70px; }
</style></head><body class="card">
<div class="row3"><span class="label">Primary</span><button class="primary">Build It</button><button class="primary sml">Save</button><button class="primary pill">Play Mode</button></div>
<div class="row3"><span class="label">Secondary</span><button class="secondary">Preview</button><button class="secondary sml">Cancel</button><button class="secondary pill">Manage Worlds</button></div>
<div class="row3"><span class="label">Ghost</span><button class="ghost">Dismiss</button><button class="ghost sml">Later</button></div>
<div class="row3"><span class="label">Danger</span><button class="danger">Delete 3 Notes</button></div>
</body></html>
