<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body.card { padding: 20px; display:flex; flex-direction:column; gap: 10px; }
.callout { border-radius: 14px; padding: 12px 16px; box-shadow: var(--inner-gloss-top), 0 2px 6px rgba(0,0,0,.25); display:flex; gap:12px; align-items:flex-start; border-left: 4px solid; }
.callout .t { font-weight:700; font-family: var(--font-display); font-size: 14px; }
.callout .b { font-size: 13px; color: var(--fg-2); line-height: 1.45; }
.c-note { background: rgba(58,164,194,.12); border-color:#3aa4c2; }
.c-tip  { background: rgba(80,225,49,.12);  border-color:#50e131; }
.c-warn { background: rgba(244,200,66,.14); border-color:#f4c842; }
.c-danger { background: rgba(217,48,48,.12); border-color:#d93030; }
img.em { width: 28px; height:28px; flex: 0 0 auto; }
</style></head><body class="card">
<div class="callout c-note"><img class="em" src="../assets/emotion-focused.svg"><div><div class="t" style="color:#7fc8dc">Focused — Note</div><div class="b">Ambient memory about this room.</div></div></div>
<div class="callout c-tip"><img class="em" src="../assets/emotion-energized.svg"><div><div class="t" style="color:#7bda2e">Energized — Tip</div><div class="b">Tap the plumbob to re-center the workspace.</div></div></div>
<div class="callout c-warn"><img class="em" src="../assets/emotion-happy.svg"><div><div class="t" style="color:#f4c842">Happy — Warning</div><div class="b">Your autosave is behind by 2 min.</div></div></div>
<div class="callout c-danger"><img class="em" src="../assets/emotion-tense.svg"><div><div class="t" style="color:#ff6b6b">Tense — Danger</div><div class="b">You can't undo deleting this vault.</div></div></div>
</body></html>
