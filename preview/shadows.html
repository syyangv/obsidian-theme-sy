<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body.card { padding: 28px; display:flex; gap: 22px; align-items:center; justify-content: space-between; background: var(--sim-navy-700); }
.tile { width: 120px; height: 80px; border-radius: 14px; background: linear-gradient(180deg,#1a7e9e,#05161f); display:flex; align-items:flex-end; justify-content:center; padding: 8px; font-family: var(--font-mono); font-size: 10px; color: #e3f6fb; font-weight: 700; border: 1px solid var(--border); }
.sm { box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 1px 2px rgba(0,0,0,.25); }
.md { box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 6px 14px rgba(0,0,0,.35), 0 2px 4px rgba(0,0,0,.25); }
.lg { box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 18px 36px rgba(0,0,0,.45), 0 4px 10px rgba(0,0,0,.3); }
.glow { box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 0 24px rgba(80,225,49,.55), 0 0 4px rgba(80,225,49,.9); background: linear-gradient(180deg,#50e131,#2f8e16); color:#0b2a0b; }
</style></head><body class="card">
<div class="tile sm">sm</div>
<div class="tile md">md</div>
<div class="tile lg">lg</div>
<div class="tile glow">plumbob glow</div>
</body></html>
