<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body.card { display:flex; flex-direction:column; gap:14px; }
.ramp { display: grid; grid-template-columns: 80px repeat(7, 1fr); gap: 6px; align-items: stretch; }
.ramp .name { color: var(--fg-2); font-weight: 700; font-size: 13px; align-self: center; font-family: var(--font-display); }
.chip { height: 56px; border-radius: 10px; box-shadow: var(--inner-gloss-top), var(--shadow-sm); display:flex; align-items:flex-end; padding: 6px 8px; color: rgba(0,0,0,.65); font-size: 10px; font-weight: 800; font-family: var(--font-mono); }
.chip.dark { color: rgba(255,255,255,.85); }
</style></head><body class="card">
<div class="ramp">
  <div class="name">Plumbob</div>
  <div class="chip" style="background:#e7fbd4">50</div>
  <div class="chip" style="background:#c9f59c">100</div>
  <div class="chip" style="background:#a7ea5c">200</div>
  <div class="chip" style="background:#7bda2e">300</div>
  <div class="chip" style="background:#50e131">400</div>
  <div class="chip dark" style="background:#3fb820">500</div>
  <div class="chip dark" style="background:#2f8e16">600</div>
</div>
<div class="ramp">
  <div class="name">Sim-Teal</div>
  <div class="chip" style="background:#e3f6fb">50</div>
  <div class="chip" style="background:#bfe7f1">100</div>
  <div class="chip" style="background:#7fc8dc">200</div>
  <div class="chip dark" style="background:#3aa4c2">300</div>
  <div class="chip dark" style="background:#1a7e9e">400</div>
  <div class="chip dark" style="background:#0e5f7c">500</div>
  <div class="chip dark" style="background:#094a63">600</div>
</div>
<div class="ramp">
  <div class="name">Sim-Navy</div>
  <div class="chip dark" style="background:#063749">700</div>
  <div class="chip dark" style="background:#042634">800</div>
  <div class="chip dark" style="background:#05161f">900</div>
  <div class="chip" style="background:#fbf8f1; color:#3d3628">Ivory 50</div>
  <div class="chip" style="background:#f5efdf; color:#3d3628">Ivory 100</div>
  <div class="chip" style="background:#e9dec4; color:#3d3628">Ivory 200</div>
  <div class="chip" style="background:#f4c842; color:#6e4e08">Simoleon</div>
</div>
</body></html>
