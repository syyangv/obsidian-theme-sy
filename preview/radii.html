<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body.card { padding: 20px; display:flex; gap: 14px; align-items:center; justify-content: space-between; }
.tile { width: 90px; height: 90px; background: linear-gradient(180deg,#3aa4c2,#094a63); box-shadow: var(--inner-gloss-top), var(--shadow-sm); display:flex; align-items:flex-end; justify-content:center; padding-bottom: 8px; font-family: var(--font-mono); font-size: 10px; color: #e3f6fb; font-weight: 700; border: 1px solid var(--border); }

<div class="tile" style="border-radius: 4px">xs · 4</div>

<div class="tile" style="border-radius: 22px">lg · 22</div>
<div class="tile" style="border-radius: 32px">xl · 32</div>
<div class="tile" style="border-radius: 999px">pill</div>
