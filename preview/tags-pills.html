<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body.card { padding: 20px; display:flex; flex-direction:column; gap: 10px; }
.row3 { display:flex; gap: 8px; flex-wrap: wrap; align-items:center; }
.label2 { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--fg-3); font-weight: 800; width: 60px; }
.tag {
  padding: 3px 12px; border-radius: 999px; font-size: 12px; font-weight: 800;
  border: 1px solid; box-shadow: var(--inner-gloss-top);
}
.t-accent { background: linear-gradient(180deg,#7bda2e,#3fb820); color:#0b2a0b; border-color:#2f8e16; }
.t-flirty { background: linear-gradient(180deg,#ff9cc7,#ff6fae); color:#fff; border-color:#c7417f; }
.t-focus  { background: linear-gradient(180deg,#7fc8dc,#3aa4c2); color:#fff; border-color:#0e5f7c; }
.t-insp   { background: linear-gradient(180deg,#e3cbff,#c79bff); color:#3b1f6a; border-color:#7c5cb8; }
.t-gold   { background: linear-gradient(180deg,#ffe070,#f4c842); color:#6e4e08; border-color:#a67a0f; }
.badge { display:inline-flex; align-items:center; gap:6px; padding: 2px 10px 2px 3px; border-radius:999px; background: rgba(127,200,220,.1); border: 1px solid var(--border); font-size: 12px; color: var(--fg-1); }
.badge .dot { width:16px; height:16px; border-radius:999px; background: linear-gradient(180deg,#50e131,#2f8e16); box-shadow: var(--inner-gloss-top); }
</style></head><body class="card">
<div class="row3"><span class="label2">Tags</span>
  <span class="tag t-accent">#sims</span>
  <span class="tag t-flirty">#ideas</span>
  <span class="tag t-focus">#focus</span>
  <span class="tag t-insp">#inspired</span>
  <span class="tag t-gold">§premium</span>
</div>
<div class="row3"><span class="label2">Status</span>
  <span class="badge"><span class="dot"></span>Energized</span>
  <span class="badge"><span class="dot" style="background:linear-gradient(180deg,#ff9cc7,#ff6fae)"></span>Flirty</span>
  <span class="badge"><span class="dot" style="background:linear-gradient(180deg,#ffb680,#ff8c3a)"></span>Playful</span>
  <span class="badge"><span class="dot" style="background:linear-gradient(180deg,#ff6b6b,#d93030)"></span>Tense</span>
</div>
</body></html>
